apiVersion: apps/v1
kind: Deployment
metadata:
  name: yoga-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yoga-app
  template:
    metadata:
      labels:
        app: yoga-app
    spec:
      containers:
      - name: yoga-app
        image: sachin938/dockerhub_yoga-site:latest
        ports:
        - containerPort: 80
